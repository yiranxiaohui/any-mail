name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: |
          bun install
          cd web && bun install

      - name: Build frontend
        run: cd web && bun run build
        env:
          VITE_API_BASE: ${{ secrets.WORKER_URL }}

      - name: Ensure D1 database exists
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 list --json
        id: d1_list

      - name: Create or reuse D1 database
        shell: bash
        run: |
          DB_ID=$(echo '${{ steps.d1_list.outputs.command-output }}' | jq -r '.[] | select(.name=="any-mail-db") | .uuid')
          if [ -z "$DB_ID" ]; then
            echo "Database not found, creating..."
            echo "CREATE_DB=true" >> $GITHUB_ENV
          else
            echo "Database found: $DB_ID"
            echo "D1_DATABASE_ID=$DB_ID" >> $GITHUB_ENV
            sed -i "s/placeholder-replace-after-creation/$DB_ID/" wrangler.toml
          fi

      - name: Create D1 database
        if: env.CREATE_DB == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 create any-mail-db
        id: d1_create

      - name: Set D1 database ID from creation
        if: env.CREATE_DB == 'true'
        shell: bash
        run: |
          DB_ID=$(echo '${{ steps.d1_create.outputs.command-output }}' | grep -oP '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}')
          echo "D1_DATABASE_ID=$DB_ID" >> $GITHUB_ENV
          sed -i "s/placeholder-replace-after-creation/$DB_ID/" wrangler.toml

      - name: Run database migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 execute any-mail-db --remote --file=migrations/0001_init.sql

      - name: Run database migrations (settings)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 execute any-mail-db --remote --file=migrations/0002_settings.sql

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set Worker secrets
        run: echo '${{ secrets.WORKER_SECRETS }}' | bunx wrangler secret bulk
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy frontend to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy web/dist --project-name=any-mail --branch=main
